<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fuse.js Simple Title Search</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 16px;
    }
    h1 { margin-bottom: 0.4em; }
    input {
      width: 100%;
      padding: 12px 16px;
      font-size: 1.1rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 3px rgba(0,102,204,0.15);
    }
    #results {
      margin-top: 24px;
    }
    .result-item {
      display: block;
      padding: 12px 16px;
      margin-bottom: 8px;
      background: #f8f9fa;
      border-radius: 6px;
      color: #1a1a1a;
      text-decoration: none;
      transition: background 0.13s;
    }
    .result-item:hover {
      background: #e9ecef;
    }
    .no-results {
      color: #666;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>Search Links</h1>

<input type="text" id="search" placeholder="Type to search titles..." autocomplete="off" />

<div id="results"></div>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>

<script>
// ────────────────────────────────────────────────
const data = [
  { title: "Home Page",              link: "https://example.com/" },
  { title: "Documentation",          link: "https://example.com/docs" },
  { title: "API Reference",          link: "https://example.com/api" },
  { title: "Getting Started Guide",  link: "https://example.com/start" },
  { title: "JavaScript Best Practices", link: "https://javascript.info/" },
  { title: "React Official Tutorial", link: "https://react.dev/learn" },
  { title: "TypeScript Handbook",    link: "https://www.typescriptlang.org/docs/" },
  { title: "MDN Web Docs - Fetch API", link: "https://developer.mozilla.org/en-US/docs/Web/API/Fetch_API" },
  { title: "CSS Tricks",             link: "https://css-tricks.com/" },
  { title: "Web.dev by Google",      link: "https://web.dev/" },
  { title: "Frontend Masters",       link: "https://frontendmasters.com/" },
  { title: "Smashing Magazine",      link: "https://www.smashingmagazine.com/" },
];

// ────────────────────────────────────────────────
const fuse = new Fuse(data, {
  keys: ["title"],
  threshold: 0.3,           // 0.0 = perfect match, 1.0 = very loose
  ignoreLocation: true,     // match anywhere in the string
  includeScore: false,
  shouldSort: true,
});

// ────────────────────────────────────────────────
const searchInput = document.getElementById("search");
const resultsDiv  = document.getElementById("results");

function renderResults(items) {
  // 1. Remove everything that was previously rendered
  resultsDiv.innerHTML = "";

  if (items.length === 0) {
    const msg = document.createElement("div");
    msg.className = "no-results";
    msg.textContent = "No matching links found.";
    resultsDiv.appendChild(msg);
    return;
  }

  // 2. Create brand new <a> elements
  const fragment = document.createDocumentFragment();

  for (const item of items) {
    const a = document.createElement("a");
    a.className = "result-item";
    a.href = item.link;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.textContent = item.title;
    fragment.appendChild(a);
  }

  resultsDiv.appendChild(fragment);
}

// ────────────────────────────────────────────────
function onInput() {
  const query = searchInput.value.trim();

  if (query.length === 0) {
    renderResults([]);           // or renderResults(data) if you want to show all by default
    return;
  }

  const result = fuse.search(query);
  const matches = result.map(r => r.item);

  renderResults(matches);
}

searchInput.addEventListener("input", onInput);

// Optional: show nothing / all items on load
renderResults(data);          // ← uncomment to show all items initially
</script>

</body>
</html>
